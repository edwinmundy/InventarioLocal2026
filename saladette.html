<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saladette - Control de Productos Frescos</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        /* Layout principal */
        .saladette-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
        }
        
        @media (max-width: 968px) {
            .saladette-layout {
                grid-template-columns: 1fr;
            }
        }
        
        /* Panel izquierdo - Agregar productos */
        .panel-agregar-saladette {
            background: linear-gradient(135deg, #fef3c7 0%, #fffbeb 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }
        
        .panel-agregar-saladette h3 {
            margin-bottom: 16px;
            color: #92400e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-saladette {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .form-saladette select,
        .form-saladette input {
            padding: 12px;
            border: 2px solid #fcd34d;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
        }
        
        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }
        
        .btn-agregar-saladette {
            background: #d97706;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-agregar-saladette:hover {
            background: #b45309;
            transform: translateY(-2px);
        }
        
        /* Lista de categorías para seleccionar */
        .categorias-saladette {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .categoria-chip {
            display: inline-block;
            padding: 8px 16px;
            margin: 4px;
            background: var(--bg);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .categoria-chip:hover {
            background: var(--primary);
            color: white;
        }
        
        .categoria-chip.active {
            background: var(--primary);
            color: white;
        }
        
        /* Panel derecho - Tabla de productos activos */
        .panel-productos {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
        }
        
        /* Cards de resumen */
        .resumen-saladette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .card-resumen-saladette {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .card-resumen-saladette .numero {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .card-resumen-saladette .label {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        
        .card-resumen-saladette.activos .numero { color: #10b981; }
        .card-resumen-saladette.por-vencer .numero { color: #f59e0b; }
        .card-resumen-saladette.criticos .numero { color: #ef4444; }
        .card-resumen-saladette.total .numero { color: #3b82f6; }
        
        /* Tabla de productos */
        .tabla-saladette-container {
            max-height: 550px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .tabla-saladette {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        .tabla-saladette th {
            background: var(--bg);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-light);
            position: sticky;
            top: 0;
            border-bottom: 2px solid var(--border);
        }
        
        .tabla-saladette td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        
        .tabla-saladette tr:hover {
            background: var(--bg);
        }
        
        .tabla-saladette tr.critico {
            background: #fef2f2;
        }
        
        .tabla-saladette tr.advertencia {
            background: #fffbeb;
        }
        
        .tabla-saladette tr.vencido {
            background: #f3f4f6;
            opacity: 0.6;
            text-decoration: line-through;
        }
        
        .tiempo-restante {
            font-family: monospace;
            font-weight: bold;
        }
        
        .tiempo-normal { color: #10b981; }
        .tiempo-advertencia { color: #f59e0b; }
        .tiempo-critico { color: #ef4444; animation: pulse 1s infinite; }
        .tiempo-vencido { color: #6b7280; text-decoration: line-through; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .btn-consumir {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        
        .btn-consumir:hover:not(:disabled) {
            background: #fecaca;
            transform: scale(1.1);
        }
        
        .btn-consumir:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .btn-eliminar-producto {
            background: #e5e7eb;
            color: #4b5563;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .btn-eliminar-producto:hover {
            background: #d1d5db;
            color: #dc2626;
        }
        
        .lote-badge {
            font-size: 0.7rem;
            background: #e0e7ff;
            color: #3730a3;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        
        .empty-state-saladette {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        
        .filtros-saladette {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filtros-saladette select,
        .filtros-saladette input {
            padding: 8px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
        }
        
        .search-input {
            flex: 1;
            min-width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <h1>🥗 Saladette - Control de Productos Frescos</h1>
                <div id="user-info"></div>
            </div>
            <nav class="main-nav" id="main-nav"></nav>
        </header>

        <main>
            <div class="saladette-layout">
                <!-- COLUMNA IZQUIERDA -->
                <div>
                    <!-- Panel para agregar productos -->
                    <div class="panel-agregar-saladette">
                        <h3>➕ Agregar a Saladette</h3>
                        <div class="form-saladette">
                            <select id="select-categoria-saladette" onchange="cargarProductosPorCategoria()">
                                <option value="">Seleccionar categoría...</option>
                            </select>
                            
                            <select id="select-producto-saladette">
                                <option value="">Seleccionar producto...</option>
                            </select>
                            
                            <div class="form-row-3">
                                <div>
                                    <label style="font-size: 0.8rem; color: #92400e;">Cantidad</label>
                                    <input type="number" id="cantidad-saladette" min="1" value="1">
                                </div>
                                <div>
                                    <label style="font-size: 0.8rem; color: #92400e;">Vida Útil (horas)</label>
                                    <input type="number" id="vida-util-saladette" min="1" value="24">
                                </div>
                                <button onclick="agregarASaladette()" class="btn-agregar-saladette">
                                    ➕ Agregar
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Categorías disponibles -->
                    <div class="categorias-saladette">
                        <h4 style="margin-bottom: 12px;">📁 Categorías disponibles</h4>
                        <div id="lista-categorias-saladette">
                            <!-- Se carga dinámicamente -->
                        </div>
                    </div>
                </div>

                <!-- COLUMNA DERECHA -->
                <div class="panel-productos">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px;">
                        <h2>🥗 Productos en Saladette</h2>
                        <div style="display: flex; gap: 8px;">
                            <button onclick="limpiarVencidosSaladette()" class="btn-secondary" style="background: #fef3c7; color: #92400e;">
                                🧹 Limpiar Vencidos
                            </button>
                            <button onclick="refrescarSaladette()" class="btn-primary">
                                🔄 Actualizar
                            </button>
                        </div>
                    </div>

                    <!-- Cards de resumen -->
                    <div class="resumen-saladette">
                        <div class="card-resumen-saladette activos">
                            <div class="numero" id="count-activos-saladette">0</div>
                            <div class="label">Activos</div>
                        </div>
                        <div class="card-resumen-saladette por-vencer">
                            <div class="numero" id="count-por-vencer-saladette">0</div>
                            <div class="label">Por Vencer (2h)</div>
                        </div>
                        <div class="card-resumen-saladette criticos">
                            <div class="numero" id="count-criticos-saladette">0</div>
                            <div class="label">Críticos (1h)</div>
                        </div>
                        <div class="card-resumen-saladette total">
                            <div class="numero" id="count-total-saladette">0</div>
                            <div class="label">Total Unidades</div>
                        </div>
                    </div>

                    <!-- Filtros -->
                    <div class="filtros-saladette">
                        <select id="filtro-estado-saladette" onchange="renderizarTablaSaladette()">
                            <option value="todos">Todos los estados</option>
                            <option value="activo">Activos</option>
                            <option value="critico">Críticos</option>
                            <option value="advertencia">Por vencer</option>
                            <option value="vencido">Vencidos</option>
                        </select>
                        <input type="text" id="filtro-busqueda-saladette" placeholder="🔍 Buscar producto..." onkeyup="renderizarTablaSaladette()" class="search-input">
                    </div>

                    <!-- Tabla de productos -->
                    <div id="tabla-saladette-container" class="tabla-saladette-container">
                        <div class="empty-state-saladette">
                            <div class="empty-icon">🥗</div>
                            <h3>No hay productos en saladette</h3>
                            <p>Usa el panel izquierdo para agregar productos frescos</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        let productosSaladette = [];
        let intervaloSaladette = null;
        let categoriaSeleccionada = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (!verificarSesion()) return;
            inicializarDatos();
            
            cargarCategoriasSaladette();
            cargarSaladetteDesdeStorage();
            
            // Actualizar cada segundo
            intervaloSaladette = setInterval(() => {
                actualizarTiemposSaladette();
                renderizarTablaSaladette();
            }, 1000);
        });

        window.addEventListener('beforeunload', () => {
            if (intervaloSaladette) clearInterval(intervaloSaladette);
        });

        // ==========================================
        // FUNCIONES DE STORAGE
        // ==========================================
        
        function cargarSaladetteDesdeStorage() {
            const guardado = localStorage.getItem('inventario_saladette');
            if (guardado) {
                productosSaladette = JSON.parse(guardado);
            } else {
                productosSaladette = [];
            }
            renderizarTablaSaladette();
        }

        function guardarSaladette() {
            localStorage.setItem('inventario_saladette', JSON.stringify(productosSaladette));
        }

        // ==========================================
        // CARGAR CATEGORÍAS Y PRODUCTOS
        // ==========================================
        
        function cargarCategoriasSaladette() {
            const categorias = obtenerCategorias();
            const container = document.getElementById('lista-categorias-saladette');
            const selectCat = document.getElementById('select-categoria-saladette');
            
            if (categorias.length === 0) {
                container.innerHTML = '<p style="color: var(--text-light);">No hay categorías. Crea una en Configuración.</p>';
                return;
            }
            
            // Mostrar chips de categorías
            container.innerHTML = categorias.map(cat => `
                <span class="categoria-chip" onclick="seleccionarCategoriaFiltro('${cat.id}')">
                    ${cat.icono} ${cat.nombre}
                </span>
            `).join('');
            
            // Llenar select del formulario
            selectCat.innerHTML = '<option value="">Seleccionar categoría...</option>' + 
                categorias.map(cat => `<option value="${cat.id}">${cat.icono} ${cat.nombre}</option>`).join('');
        }

        function seleccionarCategoriaFiltro(catId) {
            categoriaSeleccionada = catId;
            
            // Marcar chip activo
            document.querySelectorAll('.categoria-chip').forEach((chip, index) => {
                const categorias = obtenerCategorias();
                if (categorias[index] && categorias[index].id === catId) {
                    chip.classList.add('active');
                } else {
                    chip.classList.remove('active');
                }
            });
            
            renderizarTablaSaladette();
        }

        function cargarProductosPorCategoria() {
            const catId = document.getElementById('select-categoria-saladette').value;
            if (!catId) {
                document.getElementById('select-producto-saladette').innerHTML = '<option value="">Seleccionar producto...</option>';
                return;
            }
            
            const productos = obtenerDatos(catId);
            const select = document.getElementById('select-producto-saladette');
            
            if (productos.length === 0) {
                select.innerHTML = '<option value="">No hay productos en esta categoría</option>';
                return;
            }
            
            select.innerHTML = '<option value="">Seleccionar producto...</option>' +
                productos.map(p => `<option value="${p.id}" data-nombre="${p.nombre}" data-unidad="${p.unidad}">${p.nombre} (Stock: ${p.cantidad} ${p.unidad})</option>`).join('');
        }

        // ==========================================
        // AGREGAR PRODUCTO A SALADETTE
        // ==========================================
        
        function agregarASaladette() {
            if (!verificarSesion()) return;
            
            const catId = document.getElementById('select-categoria-saladette').value;
            const prodId = document.getElementById('select-producto-saladette').value;
            const cantidad = parseInt(document.getElementById('cantidad-saladette').value) || 1;
            const vidaUtilHoras = parseInt(document.getElementById('vida-util-saladette').value) || 24;
            
            if (!catId || !prodId) {
                mostrarNotificacion('Selecciona categoría y producto', 'error');
                return;
            }
            
            // Verificar stock en inventario
            const productos = obtenerDatos(catId);
            const producto = productos.find(p => p.id === prodId);
            
            if (!producto || producto.cantidad < cantidad) {
                mostrarNotificacion(`Stock insuficiente. Disponible: ${producto?.cantidad || 0} ${producto?.unidad || 'unidades'}`, 'error');
                return;
            }
            
            // Descontar del inventario
            producto.cantidad -= cantidad;
            guardarDatos(catId, productos);
            
            // Obtener nombre de categoría
            const categorias = obtenerCategorias();
            const categoria = categorias.find(c => c.id === catId);
            
            // Crear nuevo registro en saladette
            const ahora = new Date();
            const vencimiento = new Date(ahora.getTime() + (vidaUtilHoras * 60 * 60 * 1000));
            
            const nuevoRegistro = {
                id: `sal-${Date.now()}-${Math.random().toString(36).substr(2, 6)}`,
                categoriaId: catId,
                categoriaNombre: categoria ? categoria.nombre : catId,
                productoId: prodId,
                productoNombre: producto.nombre,
                cantidad: cantidad,
                cantidadInicial: cantidad,
                vidaUtilHoras: vidaUtilHoras,
                fechaHoraInicio: ahora.toISOString(),
                fechaHoraVencimiento: vencimiento.toISOString(),
                estado: 'activo',
                consumidos: 0,
                cajeroId: cajeroActual.id,
                cajeroNombre: cajeroActual.nombre,
                cajeroCodigo: cajeroActual.codigo
            };
            
            productosSaladette.push(nuevoRegistro);
            guardarSaladette();
            
            // Limpiar formulario
            document.getElementById('cantidad-saladette').value = '1';
            document.getElementById('vida-util-saladette').value = '24';
            
            renderizarTablaSaladette();
            
            mostrarNotificacion(`✅ ${cantidad} x "${producto.nombre}" agregado a saladette (vida útil: ${vidaUtilHoras}h)`, 'success');
            
            // Registrar en auditoría
            registrarAuditoria({
                cajeroId: cajeroActual.id,
                cajeroNombre: cajeroActual.nombre,
                cajeroCodigo: cajeroActual.codigo,
                tipo: 'saladette_agregado',
                categoria: catId,
                itemNombre: producto.nombre,
                cantidad: cantidad,
                stockAnterior: 0,
                stockNuevo: cantidad
            });
        }

        // ==========================================
        // FUNCIONES DE TIEMPO
        // ==========================================
        
        function calcularTiempoRestante(fechaVencimiento) {
            const ahora = new Date().getTime();
            const vencimiento = new Date(fechaVencimiento).getTime();
            const diferencia = vencimiento - ahora;
            
            if (diferencia <= 0) {
                return { texto: 'VENCIDO', clase: 'vencido', segundos: 0, horas: 0 };
            }
            
            const horas = Math.floor(diferencia / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);
            
            let clase = 'normal';
            if (horas < 1) clase = 'critico';
            else if (horas < 2) clase = 'advertencia';
            
            return {
                texto: `${horas}h ${minutos}m ${segundos}s`,
                clase: clase,
                segundos: Math.floor(diferencia / 1000),
                horas: horas + (minutos / 60)
            };
        }
        
        function actualizarTiemposSaladette() {
            let cambios = false;
            const ahora = new Date().getTime();
            
            productosSaladette.forEach(item => {
                if (item.estado === 'activo') {
                    const vencimiento = new Date(item.fechaHoraVencimiento).getTime();
                    if (ahora >= vencimiento) {
                        item.estado = 'vencido';
                        cambios = true;
                    }
                }
            });
            
            if (cambios) {
                guardarSaladette();
                renderizarTablaSaladette();
            }
        }
        
        // ==========================================
        // CONSUMIR PRODUCTO (QUITAR UNO)
        // ==========================================
        
        function consumirProducto(id) {
            const item = productosSaladette.find(p => p.id === id);
            if (!item || item.estado !== 'activo' || item.cantidad <= 0) return;
            
            item.cantidad--;
            item.consumidos++;
            
            if (item.cantidad <= 0) {
                item.estado = 'inactivo';
                item.cantidad = 0;
            }
            
            guardarSaladette();
            renderizarTablaSaladette();
            
            mostrarNotificacion(`🍽️ Consumido 1 unidad de "${item.productoNombre}"`, 'success');
            
            // Registrar en auditoría
            registrarAuditoria({
                cajeroId: cajeroActual.id,
                cajeroNombre: cajeroActual.nombre,
                cajeroCodigo: cajeroActual.codigo,
                tipo: 'saladette_consumo',
                categoria: item.categoriaId,
                itemNombre: item.productoNombre,
                cantidad: 1,
                stockAnterior: item.cantidad + 1,
                stockNuevo: item.cantidad
            });
        }
        
        // ==========================================
        // ELIMINAR PRODUCTO (COMPLETAMENTE)
        // ==========================================
        
        function eliminarProductoSaladette(id) {
            const item = productosSaladette.find(p => p.id === id);
            if (!item) return;
            
            if (confirm(`¿Eliminar "${item.productoNombre}" (${item.cantidad} unidades) del saladette?`)) {
                productosSaladette = productosSaladette.filter(p => p.id !== id);
                guardarSaladette();
                renderizarTablaSaladette();
                mostrarNotificacion(`Producto eliminado del saladette`, 'success');
            }
        }
        
        // ==========================================
        // RENDERIZAR TABLA
        // ==========================================
        
        function renderizarTablaSaladette() {
            const container = document.getElementById('tabla-saladette-container');
            
            // Filtrar
            let filtrados = [...productosSaladette];
            const estadoFiltro = document.getElementById('filtro-estado-saladette')?.value || 'todos';
            const busqueda = document.getElementById('filtro-busqueda-saladette')?.value.toLowerCase() || '';
            
            if (estadoFiltro !== 'todos') {
                filtrados = filtrados.filter(p => p.estado === estadoFiltro);
            }
            
            if (categoriaSeleccionada) {
                filtrados = filtrados.filter(p => p.categoriaId === categoriaSeleccionada);
            }
            
            if (busqueda) {
                filtrados = filtrados.filter(p => p.productoNombre.toLowerCase().includes(busqueda));
            }
            
            // Ordenar: activos primero, luego por tiempo
            filtrados.sort((a, b) => {
                if (a.estado !== b.estado) {
                    if (a.estado === 'activo' && b.estado !== 'activo') return -1;
                    if (b.estado === 'activo' && a.estado !== 'activo') return 1;
                }
                return new Date(a.fechaHoraVencimiento) - new Date(b.fechaHoraVencimiento);
            });
            
            // Actualizar resumen
            const activos = productosSaladette.filter(p => p.estado === 'activo');
            const criticos = activos.filter(p => {
                const tiempo = calcularTiempoRestante(p.fechaHoraVencimiento);
                return tiempo.clase === 'critico';
            });
            const porVencer = activos.filter(p => {
                const tiempo = calcularTiempoRestante(p.fechaHoraVencimiento);
                return tiempo.clase === 'advertencia';
            });
            const totalUnidades = productosSaladette.reduce((sum, p) => sum + p.cantidad, 0);
            
            document.getElementById('count-activos-saladette').textContent = activos.length;
            document.getElementById('count-por-vencer-saladette').textContent = porVencer.length;
            document.getElementById('count-criticos-saladette').textContent = criticos.length;
            document.getElementById('count-total-saladette').textContent = totalUnidades;
            
            if (filtrados.length === 0) {
                container.innerHTML = `
                    <div class="empty-state-saladette">
                        <div class="empty-icon">🥗</div>
                        <h3>No hay productos para mostrar</h3>
                        <p>Agrega productos desde el panel izquierdo</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table class="tabla-saladette">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th style="text-align: center;">Cantidad</th>
                            <th style="text-align: center;">Consumidos</th>
                            <th style="text-align: center;">Vida Útil</th>
                            <th style="text-align: center;">Tiempo Restante</th>
                            <th style="text-align: center;">Hora Ingreso</th>
                            <th style="text-align: center;">Cajero</th>
                            <th style="text-align: center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            filtrados.forEach(item => {
                const tiempo = calcularTiempoRestante(item.fechaHoraVencimiento);
                const horaInicio = new Date(item.fechaHoraInicio).toLocaleString('es-ES');
                const claseFila = item.estado === 'vencido' ? 'vencido' : 
                                 item.estado === 'inactivo' ? 'vencido' : tiempo.clase;
                
                const vidaUtilTexto = `${item.vidaUtilHoras} horas`;
                const porcentajeVida = (item.consumidos / item.cantidadInicial) * 100;
                
                html += `
                    <tr class="${claseFila}">
                        <td>
                            <strong>${item.productoNombre}</strong>
                            <br>
                            <span class="lote-badge">#${item.id.slice(-6)}</span>
                        </td>
                        <td>${item.categoriaNombre}</td>
                        <td style="text-align: center; font-weight: bold; font-size: 1.1rem;">${item.cantidad}</td>
                        <td style="text-align: center; color: #6b7280;">${item.consumidos}</td>
                        <td style="text-align: center; font-size: 0.85rem;">${vidaUtilTexto}</td>
                        <td style="text-align: center;">
                            <span class="tiempo-restante tiempo-${tiempo.clase}">
                                ${item.estado === 'activo' ? tiempo.texto : 'VENCIDO'}
                            </span>
                        </td>
                        <td style="text-align: center; font-size: 0.8rem; color: #6b7280;">${horaInicio}</td>
                        <td style="text-align: center;">
                            <span style="font-size: 0.85rem;">${item.cajeroNombre}</span>
                            <br>
                            <span style="font-size: 0.7rem; color: #8b5cf6;">${item.cajeroCodigo}</span>
                        </td>
                        <td style="text-align: center;">
                            ${item.estado === 'activo' && item.cantidad > 0 ? `
                                <button class="btn-consumir" onclick="consumirProducto('${item.id}')" title="Consumir uno">
                                    🍽️
                                </button>
                            ` : ''}
                            <button class="btn-eliminar-producto" onclick="eliminarProductoSaladette('${item.id}')" title="Eliminar del saladette">
                                🗑️
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += `</tbody></table>`;
            container.innerHTML = html;
        }
        
        function limpiarVencidosSaladette() {
            const vencidos = productosSaladette.filter(p => p.estado === 'vencido');
            if (vencidos.length === 0) {
                mostrarNotificacion('No hay productos vencidos', 'info');
                return;
            }
            
            if (confirm(`¿Eliminar ${vencidos.length} productos vencidos del saladette?`)) {
                productosSaladette = productosSaladette.filter(p => p.estado !== 'vencido');
                guardarSaladette();
                renderizarTablaSaladette();
                mostrarNotificacion('Productos vencidos eliminados', 'success');
            }
        }
        
        function refrescarSaladette() {
            renderizarTablaSaladette();
            mostrarNotificacion('Actualizado', 'success');
        }
    </script>
</body>
</html>
